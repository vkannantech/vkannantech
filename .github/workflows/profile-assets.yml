name: Generate profile assets

on:
  schedule:
    - cron: "30 */3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/generate_profile_assets.py"
      - ".github/workflows/profile-assets.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate local README stat assets
        env:
          GH_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN || secrets.GITHUB_TOKEN }}
          INCLUDE_PRIVATE: ${{ secrets.PROFILE_STATS_TOKEN != '' }}
          PROFILE_USERNAME: vkannantech
          STREAK_BASELINE: "512"
        run: python scripts/generate_profile_assets.py

      - name: Commit generated assets
        run: |
          if [[ -n "$(git status --porcelain assets)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets
            git commit -m "Update profile assets"
            git push
          fi
